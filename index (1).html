<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0C0A15">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>AkyVoy Repartidor</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--p:#7C3AED;--pd:#5B21B6;--pl:#A78BFA;--a:#F59E0B;--bg:#0C0A15;--bg2:#13101F;--cd:#1A1625;--ch:#231E33;--tx:#F8F7FF;--tx2:#A5A0B8;--tx3:#6B6580;--ok:#10B981;--no:#EF4444;--wn:#F59E0B;--bd:#2A2540}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--tx);overflow-x:hidden;min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--pd);border-radius:2px}
input,textarea,select,button{font-family:inherit}
@keyframes sU{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fI{from{opacity:0}to{opacity:1}}
@keyframes tI{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes tO{from{opacity:1}to{opacity:0;transform:translateX(110%)}}
@keyframes oF{0%,100%{transform:translate(0,0)}50%{transform:translate(25px,-15px)}}
@keyframes mM{0%{transform:translateX(-1px) rotate(-.5deg)}50%{transform:translateX(1px) rotate(.5deg)}100%{transform:translateX(-1px) rotate(-.5deg)}}
@keyframes pG{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.4)}70%{box-shadow:0 0 0 8px rgba(16,185,129,0)}}
.aU{animation:sU .35s ease-out both}.fI{animation:fI .25s ease-out both}
.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}.d4{animation-delay:.2s}
.bP{background:linear-gradient(135deg,var(--ok),#059669);color:#fff;border:none;padding:9px 16px;border-radius:10px;font-weight:600;cursor:pointer;font-size:13px;display:inline-flex;align-items:center;justify-content:center;gap:5px}
.bP:active{transform:scale(.97)}
.bS{background:var(--cd);color:var(--tx);border:1px solid var(--bd);padding:8px 14px;border-radius:10px;font-weight:500;cursor:pointer;font-size:12px}
.bS:active{transform:scale(.97)}
.bNo{background:transparent;color:var(--no);border:1px solid var(--no);padding:8px 14px;border-radius:10px;font-weight:600;cursor:pointer;font-size:12px}
.bNo:active{transform:scale(.97)}
.bA{background:linear-gradient(135deg,var(--a),#D97706);color:#000;border:none;padding:9px 16px;border-radius:10px;font-weight:700;cursor:pointer;font-size:13px}
.bA:active{transform:scale(.97)}
.bI{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:var(--cd);border:1px solid var(--bd);color:var(--tx);cursor:pointer;flex-shrink:0}
.bI:active{transform:scale(.92)}
.inp{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:9px;padding:9px 12px;color:var(--tx);font-size:13px;outline:none}
.inp:focus{border-color:var(--ok);box-shadow:0 0 0 3px rgba(16,185,129,.1)}
.inp::placeholder{color:var(--tx3)}
.gc{background:rgba(26,22,37,.75);backdrop-filter:blur(10px);border:1px solid var(--bd);border-radius:14px;overflow:hidden}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:12px;font-size:10px;font-weight:600;gap:3px}
.bOk{background:rgba(16,185,129,.13);color:var(--ok)}.bWn{background:rgba(245,158,11,.13);color:var(--wn)}.bNo{background:rgba(239,68,68,.13);color:var(--no)}.bPr{background:rgba(124,58,237,.13);color:var(--pl)}
#toasts{position:fixed;top:14px;left:14px;right:14px;z-index:9999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{pointer-events:auto;background:var(--cd);border:1px solid var(--bd);border-radius:11px;padding:10px 12px;display:flex;align-items:center;gap:8px;animation:tI .3s ease-out;box-shadow:0 6px 18px rgba(0,0,0,.4)}
.toast.out{animation:tO .2s ease-in forwards}
.tI{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px}
.tB{flex:1;min-width:0}.tT{font-weight:600;font-size:11px}.tM{font-size:10px;color:var(--tx2);margin-top:1px}
.bn{position:fixed;bottom:0;left:0;right:0;background:rgba(12,10,21,.95);backdrop-filter:blur(18px);border-top:1px solid var(--bd);display:flex;justify-content:space-around;z-index:100;padding:5px 0;padding-bottom:calc(5px + env(safe-area-inset-bottom,5px))}
.ni{display:flex;flex-direction:column;align-items:center;gap:1px;cursor:pointer;color:var(--tx3);font-size:9px;padding:4px 8px;-webkit-user-select:none;user-select:none;transition:color .15s;min-width:52px}
.ni.on{color:var(--ok)}.ni i{font-size:17px;margin-bottom:1px}
.moO{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(3px);z-index:500;display:flex;align-items:center;justify-content:center;animation:fI .2s}
.moC{background:var(--cd);border:1px solid var(--bd);border-radius:16px;padding:18px;width:100%;max-width:460px;max-height:80dvh;overflow-y:auto;animation:sU .25s ease-out}
.pbar{height:4px;background:var(--bg);border-radius:2px;overflow:hidden}.pfill{height:100%;border-radius:2px;transition:width .4s ease}
.lo{position:absolute;border-radius:50%;filter:blur(60px);opacity:.25;animation:oF 7s ease-in-out infinite}
.page{padding-bottom:calc(64px + env(safe-area-inset-bottom,5px))}
.motoMk{animation:mM .4s ease-in-out infinite}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.dot-ok{background:var(--ok)}.dot-wn{background:var(--wn)}.dot-no{background:var(--no)}.dot-off{background:var(--tx3)}
</style>
</head>
<body>

<div id="pgL" style="min-height:100dvh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden">
  <div class="lo" style="width:220px;height:220px;background:var(--ok);top:-30px;left:-30px"></div>
  <div class="lo" style="width:180px;height:180px;background:#34D399;bottom:-25px;right:-25px;animation-delay:2s"></div>
  <div class="gc aU" style="padding:28px 24px;width:360px;max-width:92vw;position:relative;z-index:2">
    <div style="text-align:center;margin-bottom:18px">
      <svg viewBox="0 0 220 70" width="150" height="48"><defs><linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#34D399"/><stop offset="100%" stop-color="#10B981"/></linearGradient></defs><path d="M28 8C28 8,12 22,12 33C12 42,19 49,28 49C37 49,44 42,44 33C44 22,28 8,28 8Z" fill="url(#g1)"/><circle cx="28" cy="31" r="6" fill="#0C0A15" opacity=".3"/><path d="M22 34l2-5h4l1 2h4l-1-2h2l3 5" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="23.5" cy="36" r="2.5" fill="none" stroke="#fff" stroke-width="1.5"/><circle cx="33.5" cy="36" r="2.5" fill="none" stroke="#fff" stroke-width="1.5"/></svg>
      <h2 style="font-size:17px;font-weight:700;margin-top:10px">Portal de Repartidor</h2>
      <p style="font-size:11px;color:var(--tx2)">Solo acceso con aprobación previa</p>
    </div>
    <div style="margin-bottom:8px"><input class="inp" id="lI" placeholder="ID de repartidor"></div>
    <div style="margin-bottom:14px"><input class="inp" id="lP" type="password" placeholder="Contraseña"></div>
    <button onclick="doLogin()" class="bP" style="width:100%;padding:12px"><i class="fas fa-arrow-right-to-bracket"></i>Ingresar</button>
    <button onclick="qLogin()" class="bP" style="width:100%;padding:12px;margin-top:6px;background:linear-gradient(135deg,var(--ok),#059669);color:#fff"><i class="fas fa-bolt" style="margin-right:4px"></i>Entrar Directo (Demo)</button>
  </div>
</div>

<div id="pgA" style="display:none">
  <header style="position:sticky;top:0;z-index:50;padding:8px 14px;display:flex;align-items:center;justify-content:space-between;background:rgba(12,10,21,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--bd)">
    <div style="display:flex;align-items:center;gap:8px"><div style="width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--ok),#059669)"><i class="fas fa-motorcycle" style="color:#fff;font-size:12px"></i></div><div><div style="font-weight:700;font-size:13px">Carlos Mendoza</div><div style="font-size:10px;color:var(--tx3)">REP-0042</div></div>
    <div style="width:8px;height:8px;border-radius:50%;background:var(--ok);animation:pG 1.5s infinite"></div>
  </header>
  <div id="t-avail" class="page tC"></div>
  <div id="t-act" class="page tC" style="display:none"></div>
  <div id="t-earn" class="page tC" style="display:none"></div>
  <div id="prof" class="page tC" style="display:none"></div>
  <nav class="bn">
    <div class="ni on" onclick="goT('avail')"><i class="fas fa-list"></i><span>Disponibles</span></div>
    <div class="ni" onclick="goT('act')"><i class="fas fa-route"></i><span>En Curso</span></div>
    <div class="ni" onclick="goT('earn')"><i class="fas fa-wallet"></i><span>Ganancias</span></div>
    <div class="ni" onclick="goT('prof')"><i class="fas fa-user-gear"></i><span>Perfil</span></div>
  </nav>
</div>
<div id="toasts"></div><div id="modal"></div>

<script>
var mf=function(a,f){for(var i=0;i<a.length;i++){if(f(a[i]))return a[i]}return null};
var BC=new BroadcastChannel('akyvoy_channel');
BC.onmessage=function(e){var d=e.data;if(!d||d.to!=='delivery')return;
if(d.type==='new_delivery'){addDO(d);renderAvail();renderAct()}
if(d.type==='proximity_check'){if(S.actD&&S.actD.code===d.orderCode)toast('Cerca del destino','Llegas en minutos','wn')}
};
function sm(t,d){BC.postMessage({from:'delivery',to:t,type:d})};

var S={user:null,approved:true,online:true,commission:50,balance:147.50,activeDelivery:null,completedToday:5,rating:4.9,driverType:'comisionable',
avail:ld('ak_d_av',[
{code:'AK-1046',rest:'Sabor Criollo',restAddr:'Calle Principal #45',dist:'1.2 km',items:'Bandeja Paisa x2',total:90,tip:2,client:'María G.',clientAddr:'Calle 5 #12-30',coords:[4.660,-74.065]},
{code:'AK-1047',rest:'Pizza Rex',restAddr:'Av. Industrial #120',dist:'2.8 km',items:'Pizza Pepperoni x1',total:65,tip:1.50,client:'Pedro L.',clientAddr:'Av. 3 #45-10',coords:[4.653,-74.055]},
{code:'AK-1048',rest:'Burger House',restAddr:'Cra 15 #78-32',dist:'4.1 km',items:'Clásica Smash x3',total:96,tip:3,client:'Laura M.',clientAddr:'Cra 7 #88-20',coords:[4.658,-74.070]},
{code:'AK-1049',rest:'Sushi Lover',restAddr:'CC Plaza #8',dist:'5.5 km',items:'Roll California x2',total:130,tip:4,client:'Diego R.',clientAddr:'Calle 12 #3-15',coords:[4.650,-74.062]},
{code:'AK-1050',rest:'Jugo Express',restAddr:'Parque Central K-3',dist:'7.3 km',items:'Smoothie Mango x4',total:72,tip:2,client:'Sofía H.',clientAddr:'Diag 40 #5-8',coords:[4.655,-74.075]}
]),
earnings:ld('ak_d_earn',[{code:'AK-1042',earn:7.17,comm:0.17,time:'10:45',type:'fijo'},{code:'AK-1041',earn:6.26,comm:0.26,time:'10:20',type:'comisionable'},{code:'AK-1039',earn:5.70,comm:0.04,time:'09:55',type:'comisionable'},{code:'AK-1038',earn:3.30,comm:0.16,time:'09:30',type:'fijo'},{code:'AK-1037',earn:2.80,comm:0.06,time:'09:10',type:'comisionable'},{code:'AK-1036',earn:3.50,comm:0.30,time:'08:45',type:'fijo'},{code:'AK-1035',earn:2.66,comm:0.16,time:'08:20',type:'comisionable'}])};

function ld(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d}catch(e){return d}}
function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}

var CO={c:[4.6561,-74.0612],r:[4.658,-74.064],cl:[4.652,-74.058],ds:[4.662,-74.068],de:[4.652,-74.058]};
function gR(){var r=[];for(var i=0;i<=50;i++){var t=i/50;r.push([CO.ds[0]+(CO.de[0]-CO.ds[0])*t+Math.sin(t*Math.PI*2)*.0015,CO.ds[1]+(CO.de[1]-CO.ds[1])*t+Math.cos(t*Math.PI*1.5)*.0008])}return r}

function toast(t,m,tp){var c=document.getElementById('toasts');var co={info:'#7C3AED',ok:'#10B981',wn:'#F59E0B,no:'#EF4444'};var ic={info:'fa-bell',ok:'fa-check-circle',wn:'fa-exclamation-triangle',no:'fa-times-circle'};var el=document.createElement('div');el.className='toast';el.innerHTML='<div class="tI" style="background:'+co[tp]+'22;color:'+co[tp]+'"><i class="fas '+ic[tp]+'"></i></div><div class="tB"><div class="tT">'+t+'</div><div class="tM">'+m+'</div></div>';c.appendChild(el);setTimeout(function(){el.classList.add('out');setTimeout(function(){el.remove()},200)},3500)}
function om(h){document.getElementById('modal').innerHTML='<div class="moO" onclick="if(event.target===this)cm()"><div class="moC">'+h+'</div></div>'}
function cm(){document.getElementById('modal').innerHTML=''}

function doLogin(){var i=document.getElementById('lI').value.trim();if(!i){toast('Error','Ingresa tu ID','no');return}S.user=i;sv('ak_d_u',i);checkAcc()}
function qLogin(){S.user='REP-0042';sv('ak_d_u',S.user);checkAcc()}
if(ld('ak_d_u',null)){S.user=ld('ak_d_u');setTimeout(checkAcc,50)}
function checkAcc(){document.getElementById('pgL').style.display='none';if(!S.approved){document.getElementById('pgL').style.display='flex';document.getElementById('pgL').querySelector('.gc').innerHTML='<div style="text-align:center;padding:30px"><div style="width:50px;height:50px;border-radius:50%;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;background:rgba(239,68,68,.13)"><i class="fas fa-ban" style="font-size:18px;color:var(--no)"></i></div><h2 style="font-size:16px;font-weight:700;margin-bottom:6px">No aprobado</h2><p style="font-size:12px;color:var(--tx2)">Tu cuenta no ha sido aprobada por servicio técnico aún.</p><button onclick="qLogin()" class="bS" style="margin-top:12px">Volver</button></div>';return}document.getElementById('pgA').style.display='block';iD()}
function checkAcc(){document.getElementById('pgL').style.display='none';document.getElementById('pgA').style.display='block';iD()}

function iD(){rAvail();renderAct();renderEarn();renderProf()}
function goT(t){var ts=['avail','act','earn','prof'];for(var i=0;i<ts.length;i++){var el=document.getElementById('t-'+ts[i]);if(el)el.style.display='none'}var el2=document.getElementById('t-'+t);if(el2)el2.style.display='block';var ns=document.querySelectorAll('.ni');for(var j=0;j<ns.length;j++){ns[j].classList.toggle('on',ts[j]===t}if(t==='avail')setTimeout(iDM,80)}

function rAvail(){
var el=document.getElementById('t-avail');
var pending=S.avail.filter(function(o){return true});
el.innerHTML='<div class="page"><div style="padding:12px 14px"><div style="display:flex;align-items:center;justify-content:var(--tx2);margin-bottom:10px"><h3 style="font-weight:700;font-size:15px">Pedidos Cercanos</h3><span class="badge bPr" style="margin-left:8px"><i class="fas fa-location-dot" style="font-size:8px"></i>10 km</span></div>'+
'<div id="dMap" style="height:220px;border-radius:14px;overflow:hidden;border:1px solid var(--bd);margin-bottom:10px"></div>'+
'<div style="font-size:11px;color:var(--tx3);margin-bottom:8px">'+pending.length+' pedidos disponibles</div><div style="display:flex;flex-direction:column;gap:6px">';
for(var i=0;i<pending.length;i++){var o=pending[i];
el+='<div class="gc aU" style="padding:12px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px"><span class="font-bold" style="font-size:12px;color:var(--ok)">'+o.code+'</span><span class="badge bPr" style="font-size:9px"><i class="fas fa-route" style="font-size:7px"></i>'+o.dist+'</span></div><div style="font-size:12px;font-weight:600">'+o.rest+'</div><div style="font-size:11px;color:var(--tx2);margin-bottom:2px">'+o.items+'</div><div style="display:flex;align-items:center;gap:8px;font-size:11px;color:var(--tx3)"><i class="fas fa-user" style="margin-right:3px"></i>'+o.client+'<i class="fas fa-location-dot" style="margin-left:auto;margin-right:3px"></i>'+o.clientAddr+'</div><div style="display:flex;align-items:center;justify-content:space-between;margin-top:6px;padding-top:6px;border-top:1px solid var(--bd)"><div><span class="font-bold">Q'+o.total.toFixed(2)+'</span><span class="font-size:10px;color:var(--ok)">+ Q'+o.tip+' propina</span></div><div style="display:flex;gap:4px"><button onclick="accDOrd(\''+o.code+'\')" class="bOk" style="padding:7px 12px;font-size:11px"><i class="fas fa-check" style="margin-right:3px"></i>Aceptar</button><button onclick="cancelDOrd(\''+o.code+'\')" class="bNo" style="padding:7px 12px;font-size:11px"><i class="fas fa-times"></i></button></div></div></div>'}
if(!pending.length)el.innerHTML+='<div style="text-align:center;padding:30px;color:var(--text3)"><i class="fas fa-inbox-slash" style="font-size:20px;display:block;margin-bottom:6px"></i>No hay pedidos</div>';
el.innerHTML+='</div></div>'}

function iDM(){if(S.maps.av){S.maps.av.remove();S.maps.av=null}
var map=L.map('dMap',{zoomControl:false}).setView(CO.c,14);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}/{y}.png',{attribution:'© OSM'}).addTo(map);
L.circle(CO.c,{radius:10000,color:'#10B981',fillColor:'#10B8981',fillOpacity:.04,weight:1}).addTo(map);
var yI=L.divIcon({html:'<div style="width:14px;height:14px;border-radius:50%;background:var(--ok);border:2px solid #fff;box-shadow:0 0 8px rgba(16,185,129,.5)"></div>',iconSize:[14,14],iconAnchor:[7,7],className:''});
L.marker(CO.c,{icon:yI}).addTo(map).bindPopup('Tu ubicación');
var oI=L.divIcon({html:'<div style="background:var(--a);width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid #fff;box-shadow:0 2px 5px rgba(0,0,0,.3)"><i class="fas fa-utensils" style="color:#000;font-size:9px"></i></div>',iconSize:[22,22],iconAnchor:[11,11],className:''});
for(var i=0;i<pending.length;i++){L.marker(pending[i].coords,{icon:oI}).addTo(map).bindPopup(pending[i].code)}
S.maps.av=map}

function accDOrd(code){
var o=mf(S.avail,function(x){return x.code===code});if(!o)return;
S.avail=S.avail.filter(function(x){return x.code!==code});sv('ak_d_av',S.avail);S.activeDelivery={code:o.code,rest:o.rest,restAddr:o.restAddr,client:o.client,clientAddr:o.clientAddr,items:o.items,total:o.total,status:'picking',tip:o.tip};
S.actD=S.activeDelivery;renderAct();goT('act');
toast('Pedido Aceptado','Ve a recoger a '+o.rest,'ok');
sm('client','order_pickedup',{orderCode:code,driverName:'Carlos M.'});
renderAvail();
}

function cancelDOrd(code){S.avail.push(mf(S.avail,function(x){return x.code===code})[0]);sv('ak_d_av',S.avail);if(S.activeDelivery)renderAct();renderAvail();toast('Cancelado','Pedido liberado','wn')}
function renderAct(){
var el=document.getElementById('t-act');var d=S.activeDelivery;if(!d){el.innerHTML='<div class="page" style="padding:30px 14px;text-align:center;color:var(--tx3)"><i class="fas fa-route" style="font-size:24px;display:block;margin-bottom:8px">Sin entregas activas</div>';return}
var earn=(2.50+d.tip);var comm=d.total*0.02;var net=earn-comm;
el.innerHTML='<div class="page"><div style="padding:12px 14px">'+
